<!DOCTYPE html>
<html>
<head>
<title>Resume History</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
    margin: 0;
}

.header {
    background: #0a66c2;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
}

.role {
    font-size: 18px;
    font-weight: bold;
}

.score {
    color: #0a66c2;
    font-weight: bold;
}

.skills {
    color: #555;
    margin-top: 5px;
}

.time {
    font-size: 12px;
    color: gray;
    margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">
    📊 Resume Analysis History
</div>

<div class="container" id="history"></div>

<script>
fetch("/history")
.then(res => res.json())
.then(data => {

    let html = "";

    data.forEach(item => {

        html += `
        <div class="card">
            <div class="role">${item.role}</div>
            <div class="score">Score: ${item.score}%</div>
            <div class="skills">Skills: ${item.skills}</div>
            <div class="time">${item.timestamp}</div>
        </div>
        `;
    });

    document.getElementById("history").innerHTML = html;
});
</script>

</body>
</html>
